version: 2
updates:
  # Library (root package)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        # Only auto-group safe (minor/patch) bumps. Majors come as their own
        # PRs so a React 18->19 or Tailwind 3->4 migration can be reviewed and
        # taken on deliberately, instead of bundled with eight other updates.
        update-types:
          - minor
          - patch

  # MCP server package
  - package-ecosystem: npm
    directory: /mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        # Only auto-group safe (minor/patch) bumps. Majors come as their own
        # PRs so a React 18->19 or Tailwind 3->4 migration can be reviewed and
        # taken on deliberately, instead of bundled with eight other updates.
        update-types:
          - minor
          - patch

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
