name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/configure-pages@v6
      - run: npm ci
      - run: npm run playground:build
      - run: npm --prefix docs-site ci
      - run: npm run docs:build
      # Playground at the site root (/GoldenChart/); docs under /GoldenChart/docs/.
      - name: Assemble Pages site
        run: |
          rm -rf _site
          mkdir -p _site/docs
          cp -r playground/dist/. _site/
          cp -r docs-site/dist/. _site/docs/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
