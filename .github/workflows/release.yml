name: Release

# release-please drives versioning from Conventional Commits (feat:, fix:, ...).
# On push to main it maintains a "release" PR that bumps versions and updates
# CHANGELOGs. Merging that PR tags + creates GitHub Releases, then the publish
# job pushes the affected packages to npm.
#
# Requires an NPM_TOKEN repository secret with publish rights.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      paths_released: ${{ steps.rp.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build

      - name: Publish library
        if: contains(fromJSON(needs.release-please.outputs.paths_released), '.')
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mcp server
        if: contains(fromJSON(needs.release-please.outputs.paths_released), 'mcp')
        working-directory: mcp
        run: |
          npm install
          version="$(node -p "require('../package.json').version")"
          npm pkg set "dependencies.@benseverndev-oss/goldenchart=^${version}"
          npm run build
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
