name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run check:bundle

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      # root deps so gen-props.mjs can resolve the library's TS imports
      - run: npm ci
      - run: npm --prefix docs-site ci
      # runs gen:props (react-docgen-typescript) then astro build
      - run: npm run docs:build

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      # build the library first so the mcp package can resolve `goldenchart`
      - run: npm run build
      - name: Install mcp deps
        working-directory: mcp
        run: npm install
      - name: Typecheck mcp
        working-directory: mcp
        run: npm run typecheck
      - name: Test mcp
        working-directory: mcp
        run: npm test
      - name: Build mcp
        working-directory: mcp
        run: npm run build
